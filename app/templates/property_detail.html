{% extends "base.html" %}

{% block main %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <img src="{{ url_for('static', filename='uploads/' + property.photo) }}" 
             class="img-fluid rounded" 
             style="width: 100%; object-fit: cover;">
    </div>
    <div class="col-md-6">
        <h2>{{ property.title }}</h2>

        <div class="mb-2">
            <span class="badge text-white" style="background-color: #00b8a9;">${{ property.price }}</span>
            <span class="badge bg-warning text-dark ms-1">{{ property.property_type }}</span>
        </div>

        <p class="mt-3">{{ property.description }}</p>

        <div class="d-flex gap-4 mt-3">
            <span>🛏 {{ property.bedrooms }} Bedrooms</span>
            <span>🚿 {{ property.bathrooms }} Bathrooms</span>
        </div>

        <p class="mt-3">📍 {{ property.location }}</p>

        <a href="mailto:" class="btn text-white mt-3" style="background-color: #00b8a9;">
            Email Realtor
        </a>
    </div>
</div>
{% endblock %}
