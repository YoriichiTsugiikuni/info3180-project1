{% extends "base.html" %}

{% block main %}
<div class="mt-4">
    <h2 class="mb-4">Properties</h2>
    <div class="row">
        {% for prop in properties %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <img src="{{ url_for('static', filename='uploads/' + prop.photo) }}" 
                     class="card-img-top" 
                     style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title">{{ prop.title }}</h5>
                    <p class="card-text">
                        <small>📍 {{ prop.location }}</small>
                    </p>
                    <span class="badge" style="background-color: #00b8a9;">${{ prop.price }}</span>
                </div>
                <div class="card-footer p-0">
                    <a href="{{ url_for('property_detail', propertyid=prop.id) }}" 
                       class="btn w-100 text-white" 
                       style="background-color: #00b8a9;">
                        View Property
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
